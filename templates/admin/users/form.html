{% extends 'base.html' %}
{% block title %}{{ 'Editar' if user.id else 'Novo' }} administrador{% endblock %}
{% block content %}
<div class="page-heading"><div><span class="eyebrow">ADMINISTRAÇÃO</span><h1>{{ 'Editar' if user.id else 'Novo' }} administrador</h1><p class="text-secondary mb-0">A senha é armazenada de forma segura como hash.</p></div></div>
<form method="post" class="panel mt-4">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Nome</label><input class="form-control" name="name" value="{{ user.name or '' }}" required></div>
<div class="col-md-6"><label class="form-label">Usuário</label><input class="form-control" name="username" value="{{ user.username or '' }}" autocomplete="username" required></div>
<div class="col-md-6"><label class="form-label">Senha {% if user.id %}<span class="text-secondary fw-normal">(deixe em branco para manter)</span>{% endif %}</label><input type="password" class="form-control" name="password" autocomplete="new-password" {% if not user.id %}required{% endif %}></div>
<div class="col-md-6 d-flex align-items-end"><div class="form-check form-switch mb-2"><input class="form-check-input" type="checkbox" name="active" id="active" {% if user.active or not user.id %}checked{% endif %}><label class="form-check-label" for="active">Administrador ativo</label></div></div>
</div>
<div class="d-flex gap-2 mt-4"><button class="btn btn-gold"><i class="bi bi-check-lg"></i> Salvar</button><a class="btn btn-outline-secondary" href="{{ url_for('main.users_list') }}">Cancelar</a></div>
</form>
{% endblock %}
