{% extends 'base.html' %}{% block title %}{{ 'Editar' if charm.id else 'Novo' }} charm{% endblock %}{% block content %}<div class="page-heading"><div><span class="eyebrow">RUNAS</span><h1>{{ 'Editar' if charm.id else 'Novo' }} charm</h1></div></div><form method="post" class="panel"><div class="row g-3"><div class="col-md-8"><label class="form-label">Nome da runa</label><input required class="form-control" name="name" value="{{ charm.name or '' }}"></div><div class="col-md-4"><label class="form-label">Categoria</label><select class="form-select" name="category"><option {% if charm.category=='Major' %}selected{% endif %}>Major</option><option {% if charm.category=='Minor' %}selected{% endif %}>Minor</option></select></div><div class="col-12"><label class="form-label">Descrição</label><textarea required class="form-control" rows="5" name="description">{{ charm.description or '' }}</textarea></div><div class="col-12"><label class="form-label">URL da imagem</label><input type="url" class="form-control" name="image_url" value="{{ charm.image_url or '' }}"></div></div><div class="form-actions"><a class="btn btn-outline-light" href="{{ url_for('main.charms_list') }}">Cancelar</a><button class="btn btn-gold">Salvar charm</button></div></form>{% endblock %}
